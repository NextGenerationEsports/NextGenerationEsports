kind = "web"
previewPath = "/"
title = "Next Generation Esports"
version = "1.0.0"
id = "artifacts/ng-esports"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21798

[services.development]
run = "pnpm --filter @workspace/ng-esports run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ng-esports", "run", "build" ]
publicDir = "artifacts/ng-esports/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21798"
BASE_PATH = "/"
