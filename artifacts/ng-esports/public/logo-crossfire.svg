<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <!-- CrossFire text logo in brand style -->
  <rect width="300" height="80" fill="none"/>
  <!-- CF emblem -->
  <polygon points="30,10 50,10 55,40 30,55 5,40 10,10" fill="#F5A623" opacity="0.9"/>
  <text x="36" y="38" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#111" text-anchor="middle">CF</text>
  <!-- CROSSFIRE wordmark -->
  <text x="165" y="52" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#F5A623" text-anchor="middle" letter-spacing="2">CROSSFIRE</text>
</svg>
